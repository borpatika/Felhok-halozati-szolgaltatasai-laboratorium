<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Alkalmazás</title>
  <style>
    body { font-family: sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
    nav { margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 12px; }
    nav a { margin-right: 16px; text-decoration: none; color: #333; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    .error { color: red; margin-bottom: 12px; }
    .btn { background: #333; color: #fff; border: none; padding: 8px 18px;
           cursor: pointer; border-radius: 4px; font-size: 14px; }
    .btn:hover { background: #555; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Képek listája</a>
    <a href="/upload/">Kép feltöltése</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>

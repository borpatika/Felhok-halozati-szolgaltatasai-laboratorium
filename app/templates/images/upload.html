{% extends "images/base.html" %}
{% block content %}
<h2>Kép feltöltése</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <p>
    <label>Rövid leírás:<br>
      <input type="text" name="description" required
             style="width:100%;max-width:400px;padding:6px;margin-top:4px;">
    </label>
  </p>
  <p>
    <label>Kép:<br>
      <input type="file" name="image" accept="image/*" required style="margin-top:4px;">
    </label>
  </p>
  <button type="submit" class="btn">Feltöltés és OCR futtatása</button>
</form>
{% endblock %}

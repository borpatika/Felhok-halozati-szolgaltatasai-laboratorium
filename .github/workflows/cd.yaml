name: CD

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKERHUB_KEY: ${{ secrets.DOCKER_KEY }}
  DJANGO_IMAGE_NAME: ocr-app
  RABBITMQ_IMAGE_NAME: ocr-app-mq-worker


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_KEY }}

      - name: Build Docker image for django app
        run: cd ./app && docker build -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.DJANGO_IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker image for django app
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.DJANGO_IMAGE_NAME }}:${{ github.sha }}

      - name: Build Docker image for rabbitmq
        run: cd ./notif_worker && docker build -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.RABBITMQ_IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker image for rabbitmq
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.RABBITMQ_IMAGE_NAME }}:${{ github.sha }}

      - name: Update values.yaml (django + rabbit)
        run: |
          cd helm
          # Django APP_VERSION
          sed -i '/^env:/,/^[^ ]/ s|APP_VERSION:.*|APP_VERSION: ${{ github.sha }}|' values.yaml
          # Rabbit APP_VERSION
          sed -i '/^rabbit:/,/^[^ ]/ s|APP_VERSION:.*|APP_VERSION: ${{ github.sha }}|' values.yaml
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add values.yaml
          git commit -m "Update image version to ${{ github.sha }}"
          git push
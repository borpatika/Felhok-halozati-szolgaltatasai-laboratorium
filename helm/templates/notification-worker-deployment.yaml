apiVersion: apps/v1
kind: Deployment
metadata:
  name: notif-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notif-worker
  template:
    metadata:
      labels:
        app: notif-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.rabbit.IMAGE_NAME }}:{{ .Values.rabbit.APP_VERSION }}"
          env:
          - name: RABBITMQ_HOST
            value: rabbitmq
          - name: DB_NAME
            value: "{{ .Values.postgres.db }}"
          - name: DB_USER
            value: "{{ .Values.postgres.user }}"
          - name: DB_PASSWORD
            value: "{{ .Values.postgres.password }}"
          - name: DB_HOST
            value: postgres-service